name: Build & Publish JellyTag Plugin

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore Jellytag/Jellyfin.Plugin.JellyTag/Jellyfin.Plugin.JellyTag.csproj

      - name: Build
        run: dotnet build Jellytag/Jellyfin.Plugin.JellyTag/Jellyfin.Plugin.JellyTag.csproj -c Release

      - name: Create dist directory
        run: mkdir -p dist

      - name: Package plugin
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_NAME="JellyTag"
          OUTDIR="Jellytag/Jellyfin.Plugin.JellyTag/bin/Release/net9.0"
          ZIPFILE="dist/${PLUGIN_NAME}_${VERSION}.zip"
          
          zip -j "$ZIPFILE" "${OUTDIR}"/*
          
          echo "zipfile=$ZIPFILE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute MD5
        id: md5
        run: |
          if command -v md5sum &> /dev/null; then
            HASH=$(md5sum "${{ steps.package.outputs.zipfile }}" | cut -d ' ' -f1)
          else
            HASH=$(openssl md5 "${{ steps.package.outputs.zipfile }}" | tr -d ' ')
          fi
          echo "md5=$HASH" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zipfile }}
          generate_release_notes: true
          body: |
            ## Checksum (MD5)
            `${{ steps.md5.outputs.md5 }}`

            ## Installation
            Add repository URL: `https://raw.githubusercontent.com/StunBeta/jellyfin-jellyTag/main/manifest.json`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}